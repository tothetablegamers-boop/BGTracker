<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG Convention Tracker</title>
  <meta name="theme-color" content="#1a1a2e" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
      --accent: #e94560; --text: #eaeaea; --muted: #8892a4;
      --success: #4caf50; --warning: #ff9800; --info: #2196f3;
      --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
    header { background: var(--surface); padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    nav.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; border-top: 1px solid rgba(255,255,255,0.08); z-index: 100; }
    nav.bottom-nav button { flex: 1; background: none; border: none; color: var(--muted); padding: 12px 4px; font-size: 0.7rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
    nav.bottom-nav button.active { color: var(--accent); }
    nav.bottom-nav button span.icon { font-size: 1.4rem; }
    .filters { padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; background: var(--surface); }
    .filters::-webkit-scrollbar { display: none; }
    .filter-chip { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--text); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); }
    .search-bar { padding: 10px 16px; background: var(--surface); }
    .search-bar input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--text); padding: 10px 14px; font-size: 0.9rem; }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input:focus { outline: none; border-color: var(--accent); }
    .game-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .game-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; cursor: pointer; transition: transform 0.15s; border: 1px solid rgba(255,255,255,0.06); }
    .game-card:active { transform: scale(0.98); }
    .game-card-image { width: 90px; min-height: 90px; flex-shrink: 0; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; }
    .game-card-image img { width: 90px; height: 100%; object-fit: cover; }
    .game-card-body { padding: 10px 12px; flex: 1; min-width: 0; }
    .game-card-title { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-card-original { font-size: 0.75rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
    .game-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .status-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: capitalize; }
    .status-interested { background: rgba(33,150,243,0.2); color: #64b5f6; }
    .status-reserved { background: rgba(255,152,0,0.2); color: #ffb74d; }
    .status-paid { background: rgba(156,39,176,0.2); color: #ce93d8; }
    .status-collected { background: rgba(76,175,80,0.2); color: #81c784; }
    .status-not-available { background: rgba(244,67,54,0.2); color: #e57373; }
    .game-price { font-size: 0.8rem; font-weight: 600; color: var(--accent); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding: 20px; transform: translateY(100%); transition: transform 0.3s ease; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--muted); border-radius: 2px; margin: 0 auto 16px; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent); }
    .modal-image { width: 100%; max-height: 200px; object-fit: contain; border-radius: var(--radius); background: var(--card); margin-bottom: 16px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.85rem; }
    .detail-row .label { color: var(--muted); }
    .detail-row .value { font-weight: 500; text-align: right; max-width: 60%; }
    .detail-row a { color: var(--accent); text-decoration: none; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 0.9rem; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group select option { background: var(--card); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { border: none; border-radius: 8px; padding: 12px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; width: 100%; }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--card); color: var(--text); }
    .btn-danger { background: rgba(244,67,54,0.2); color: #e57373; }
    .btn-row { display: flex; gap: 10px; margin-top: 16px; }
    .status-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
    .status-option { padding: 10px; border-radius: 8px; border: 2px solid transparent; text-align: center; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .status-option.selected { border-color: white; }
    .image-upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .image-upload-area:hover { border-color: var(--accent); }
    .image-upload-area input { display: none; }
    .image-upload-area .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .image-upload-area p { font-size: 0.8rem; color: var(--muted); }
    .image-preview { width: 100%; max-height: 150px; object-fit: contain; border-radius: 8px; margin-top: 10px; }
    .route-section { margin-bottom: 20px; }
    .route-section h3 { font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; padding: 0 16px; }
    .route-item { background: var(--card); margin: 0 16px 8px; border-radius: var(--radius); padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .route-booth { background: var(--accent); color: white; border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; font-weight: 700; min-width: 50px; text-align: center; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; box-shadow: var(--shadow); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .convention-selector { padding: 12px 16px; background: var(--bg); }
    .convention-selector select { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--text); padding: 10px 12px; font-size: 0.9rem; }
    .stats-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; }
    .stat-chip { background: var(--card); border-radius: 8px; padding: 8px 12px; text-align: center; min-width: 70px; flex-shrink: 0; }
    .stat-chip .num { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .stat-chip .lbl { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <h1>🎲 BG Convention Tracker</h1>
  <button class="btn btn-primary" style="width:auto;padding:8px 14px;font-size:0.8rem" onclick="openAddModal()">+ Add</button>
</header>

<main id="main-content"></main>

<nav class="bottom-nav">
  <button class="active" onclick="switchTab('list',this)"><span class="icon">📋</span>List</button>
  <button onclick="switchTab('route',this)"><span class="icon">🗺️</span>Route</button>
  <button onclick="switchTab('stats',this)"><span class="icon">📊</span>Stats</button>
  <button onclick="switchTab('settings',this)"><span class="icon">⚙️</span>Settings</button>
</nav>

<!-- Game Detail Modal -->
<div class="modal-overlay" id="game-modal" onclick="closeModalOnOverlay(event,'game-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="game-modal-body"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="add-modal" onclick="closeModalOnOverlay(event,'add-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="add-modal-title">Add New Game</h2>
    <div class="form-group">
     <label for="f-original-title">Game Title *</label>
    <input type="text" id="f-original-title" placeholder="e.g. Wingspan" />
    </div>
    <div class="form-group">
      <label for="f-convention">Convention *</label>
      <input type="text" id="f-convention" placeholder="e.g. SPIEL 2025" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="f-hall">Hall</label>
      <input type="text" id="f-hall" placeholder="e.g. Hall 3" />
      </div>
      <div class="form-group">
       <label for="f-booth">Booth No.</label>
      <input type="text" id="f-booth" placeholder="e.g. 3B42" />
      </div>
    </div>
    <div class="form-group">
      <label for="f-publisher">Publisher</label>
      <input type="text" id="f-publisher" placeholder="Publisher name" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="f-price">Price</label>
      <input type="number" id="f-price" placeholder="0.00" />
      </div>
      <div class="form-group">

  <label for="f-currency">
    Currency
  </label>

  <select id="f-currency">

  <option value="">Select Currency</option>
  
  <option value="JPY">JPY - Japanese Yen</option>
  <option value="USD">USD - US Dollar</option>
  <option value="EUR">EUR - Euro</option>
  <option value="GBP">GBP - British Pound</option>
  <option value="SGD">SGD - Singapore Dollar</option>
  <option value="HKD">HKD - Hong Kong Dollar</option>
  <option value="KRW">KRW - Korean Won</option>
  <option value="TWD">TWD - Taiwan Dollar</option>
  <option value="CNY">CNY - Chinese Yuan</option>
  
  </select>


        

  </div>   
    </div>

    
    <div class="form-group">
      <label for="f-url">Convention Page URL</label>
    <input type="url" id="f-url" placeholder="https://..." />
    </div>

    <div class="form-group">

    <label>Game Cover</label>
  
    <button
      type="button"
      class="btn btn-secondary"
      onclick="document.getElementById('f-image-file').click()">
      Choose Image
    </button>
  
    <input
      type="file"
      id="f-image-file"
      accept="image/*"
      onchange="uploadImage(this)"
      style="display:none"
    />

  <img
    id="f-image-preview"
    class="image-preview"
    style="display:none;margin-top:10px"
  />

</div>
    
    <div class="form-group">
  <label>Status</label>

  <div class="status-selector">

    <div
      class="status-option status-interested selected"
      data-status="interested"
      onclick="selectStatus(this,'interested')">
      ⭐ Interested
    </div>

    <div
      class="status-option status-reserved"
      data-status="reserved"
      onclick="selectStatus(this,'reserved')">
      🔖 Reserved
    </div>

    <div
      class="status-option status-paid"
      data-status="paid"
      onclick="selectStatus(this,'paid')">
      💲 Paid
    </div>

    <div
      class="status-option status-collected"
      data-status="collected"
      onclick="selectStatus(this,'collected')">
      ✅ Collected
    </div>

    <div
      class="status-option status-not-available"
      data-status="not-available"
      onclick="selectStatus(this,'not-available')">
      ❌ Not Available
    </div>

    </div>
  </div>
    
    <div class="form-group">
      <label>Priority</label>
    
      <select id="f-priority">
    
        <option value="1">
          🔥 Must Buy
        </option>
    
        <option value="2">
          ⭐ High Priority
        </option>
    
        <option value="3">
          📌 Normal
        </option>
    
        <option value="4">
          ⏳ Low Priority
        </option>
    
      </select>
    </div>
    <div class="form-group">
      <label for="f-notes">Notes</label>
    <textarea id="f-notes" rows="3" placeholder="Any notes..."></textarea>
    </div>
    <div class="btn-row">
    <button
  class="btn btn-secondary"
  onclick="closeModal('add-modal')">
  Cancel
  </button>      
  <button
  id="save-btn"
  class="btn btn-primary"
  onclick="submitForm()">
  Save
</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-DW5xABYmJerfmuEb3cLe3B1wgbOR-YpZzRh81fgF5GxGS0UIFIeTzdsH7c4HHx0hiw/exec';

  let games = [];

  let pendingSyncQueue =
  JSON.parse(
    localStorage.getItem(
      "pendingSyncQueue"
    ) || "[]"
  );
  let uploadedImageUrl = '';
  let imageUploading = false;
  const currencySymbols = {
  JPY: "¥",
  USD: "$",
  SGD: "S$",
  EUR: "€",
  GBP: "£",
  HKD: "HK$",
  KRW: "₩",
  TWD: "NT$",
  CNY: "¥"
};
  
  const statusPriority = {
  paid: 1,
  reserved: 2,
  interested: 3,
  collected: 99,
  "not-available": 100
  };
  let currentFilter = 'all';
  let currentSearch = '';
  let currentConvention = 'all';
  let selectedStatus = 'interested';
  let selectedPriority = 3;
  let currentTab = 'list';
  let editingId = null;


  let activeConvention =
  localStorage.getItem("activeConvention");

  if (!activeConvention) {

  const conventions = getConventions();

  activeConvention =
    conventions.length > 0
      ? conventions[0]
      : "all";
  }

  async function uploadImage(input) {

  const file = input.files[0];

  if (!file) return;

  imageUploading = true;

  const saveBtn = document.getElementById("save-btn");

  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = "Uploading...";
  }

  showToast("Uploading image...");

  const formData = new FormData();

  formData.append("file", file);

  formData.append(
    "upload_preset",
    "bg-convention-tracker"
  );

  try {

    const response = await fetch(
      "https://api.cloudinary.com/v1_1/dbw0c9dyb/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const result = await response.json();

      if (!result.secure_url) {
      throw new Error("Upload failed");
}

    uploadedImageUrl = result.secure_url;

    const preview =
      document.getElementById("f-image-preview");

    preview.src = uploadedImageUrl;
    preview.style.display = "block";

    imageUploading = false;

    saveBtn.disabled = false;
    saveBtn.textContent = "Save";

    showToast("Image uploaded");

  } catch (err) {

    console.error(err);

    imageUploading = false;

    saveBtn.disabled = false;
    saveBtn.textContent = "Save";

    showToast("Upload failed");
  }
}

  // ── Init ──
  window.addEventListener('load', () => {

  loadGames();
  syncPendingQueue();

  setInterval(() => {

    if (!document.hidden) {
      loadGames();
    }

  }, 60000);

});

  document.addEventListener(
    "visibilitychange",
    () => {
  
      if (!document.hidden) {
  
        console.log("App active → refreshing");
  
        loadGames();
  
      }
  
    }
  );

  
  // ── Helpers ──
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function statusLabel(s) {
    const map = { interested:'⭐ Interested', reserved:'🔖 Reserved', paid:'💜 Paid', collected:'✅ Collected', 'not-available':'❌ N/A' };
    return map[s] || s || 'Unknown';
  }

  function priorityLabel(p) {

  const map = {
    1: "🔥 Must Buy",
    2: "⭐ High",
    3: "📌 Normal",
    4: "⏳ Low"
  };

  return map[Number(p)] || "📌 Normal";
}

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // ── Tab Switching ──
 function switchTab(tab, btn) {
  currentTab = tab;

  document
    .querySelectorAll('.bottom-nav button')
    .forEach(b => b.classList.remove('active'));

  if (btn) {
    btn.classList.add('active');
  }

  renderTab();
}
  function renderTab() {
    console.log("Route tab opened");
    console.log("Games:", games);

    try{
      
    if (currentTab === 'list') renderListTab();
    else if (currentTab === 'route') renderRouteTab();
    else if (currentTab === 'stats') renderStatsTab();
    else if (currentTab === 'settings') renderSettingsTab();
    } catch(err) {

    console.error("Route tab error:", err);

    document.getElementById("main-content").innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Route tab error</p>
        <pre>${err.message}</pre>
      </div>
    `;
  }
  }

  // ── Load Games ──
  function loadGames() {
    document.getElementById('main-content').innerHTML =
      '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
    fetch(APPS_SCRIPT_URL + '?action=getGames')
      .then(r => r.json())
      .then(data => {
        games = (data.games || []).map(g => ({
          id: g.game_id,
          originalTitle: g.original_title,
          convention: g.convention,
          hall: g.hall,
          booth: g.booth_number,
          publisher: g.publisher,
          price: g.original_price,
          currency: g.original_currency,
          priority: Number(g.priority) || 3,
          url: g.convention_url,
          imageUrl: g.image_url,
          status: g.status,
          notes: g.notes,
          updatedAt: g.last_updated,
          sgdPrice: g.sgd_price,
          englishTitle: g.english_title,
        }));
        console.log(games);
        localStorage.setItem('bg_games', JSON.stringify(games));
        renderTab();
      })
      .catch(() => {
        games = JSON.parse(localStorage.getItem('bg_games') || '[]');
        renderTab();
        showToast('Offline — using cached data');
      });
  }

  // ── Conventions ──
  function getConventions() {
    return [...new Set(games.map(g => g.convention).filter(Boolean))];
  }

  // ── List Tab ──
  function renderListTab() {
    const conventions = getConventions();
    let html = '';

    if (conventions.length > 1) {
      html += `<div class="convention-selector">
        <select onchange="currentConvention=this.value;renderListTab()">
          <option value="all">All Conventions</option>
          ${conventions.map(c => `<option value="${escHtml(c)}" ${currentConvention===c?'selected':''}>${escHtml(c)}</option>`).join('')}
        </select>
      </div>`;
    }

    html += `<div class="filters">
      <div class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">All</div>
      <div class="filter-chip ${currentFilter==='interested'?'active':''}" onclick="setFilter('interested')">⭐ Interested</div>
      <div class="filter-chip ${currentFilter==='reserved'?'active':''}" onclick="setFilter('reserved')">🔖 Reserved</div>
      <div class="filter-chip ${currentFilter==='paid'?'active':''}" onclick="setFilter('paid')">💜 Paid</div>
      <div class="filter-chip ${currentFilter==='collected'?'active':''}" onclick="setFilter('collected')">✅ Collected</div>
      <div class="filter-chip ${currentFilter==='not-available'?'active':''}" onclick="setFilter('not-available')">❌ N/A</div>
    </div>`;

    html += `<div class="search-bar">
      <input type="text" placeholder="Search games..." value="${escHtml(currentSearch)}"
        oninput="currentSearch=this.value;renderListTab()" />
    </div>`;

    let filtered = games.filter(g => {
      if (currentConvention !== 'all' && g.convention !== currentConvention) return false;
      if (currentFilter !== 'all' && g.status !== currentFilter) return false;
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        return (g.originalTitle||'').toLowerCase().includes(q) ||
               (g.publisher||'').toLowerCase().includes(q) ||
               (g.convention||'').toLowerCase().includes(q);
      }
      return true;
    });

    html += renderStatsBar(filtered);

    if (filtered.length === 0) {

  function renderStatsBar(list) {
    const total = list.length;
    const collected = list.filter(g => g.status === 'collected').length;
    const spent = list.filter(g => ['paid','collected'].includes(g.status))
     .reduce( (s,g) => s + (parseFloat(g.sgdPrice)||0),0);
    return `<div class="stats-bar">
      <div class="stat-chip"><div class="num">${total}</div><div class="lbl">Total</div></div>
      <div class="stat-chip"><div class="num">${collected}</div><div class="lbl">Collected</div></div>
      <div class="stat-chip"><div class="num">${spent > 0 ? spent.toFixed(2) : '—'}</div><div class="lbl">Spending (SGD)</div></div>
    </div>`;
  }

  function renderGameCard(g) {
    
   const priorityIcon = {
      1: "🔥",
      2: "⭐",
      3: "📌",
      4: "⏳"
    }[g.priority] || "";
    const img = g.imageUrl
      ? `<div class="game-card-image"><img src="${escHtml(g.imageUrl)}" alt="" loading="lazy" /></div>`
      : `<div class="game-card-image">🎲</div>`;
    const currency = (g.currency || "").toUpperCase();

    const symbol =   currencySymbols[currency] || currency;
    const price = g.price   ? `<span class="game-price">${symbol}${g.price}</span>`  : '';
    return `<div class="game-card" onclick="openGameModal('${escHtml(g.id)}')">
      ${img}
      <div class="game-card-body">
      <div class="game-card-title">
        ${priorityIcon} ${escHtml(g.englishTitle || g.originalTitle)}
      </div>
        ${g.publisher
        ? `<div class="game-card-original">${escHtml(g.publisher)}</div>` : ''}
        <div class="game-card-meta">${[g.convention,g.hall,g.booth].filter(Boolean).map(escHtml).join(' · ')}</div>
        <div class="game-card-footer">
          <span class="status-badge status-${escHtml(g.status||'interested')}">${statusLabel(g.status)}</span>
          ${price}
        </div>
      </div>
    </div>`;
  }

    html += `<h2>${escHtml(g.originalTitle||'Untitled')}</h2>`;
    const rows = [
      ['Convention', g.convention],
      ['Hall', g.hall],
      ['Booth', g.booth],
      ['Publisher', g.publisher],

  'Price',  g.price ? `${currencySymbols[(g.currency||'').toUpperCase()] || g.currency || ''}${g.price}` : null],
      ['Status', statusLabel(g.status)],
      ['Notes', escHtml(g.notes)],
      ['Link', g.url ? `<a href="${escHtml(g.url)}" target="_blank">Open page ↗</a>` : null],

     console.log("uploadedImageUrl =", uploadedImageUrl);

    localStorage.setItem('bg_games', JSON.stringify(games));
    const isEdit = !!editingId;

closeModal("add-modal");

  // ── Delete ──
  function deleteGame(id) {
    if (!confirm('Delete this game?')) return;
    games = games.filter(g => g.id !== id);
    localStorage.setItem('bg_games', JSON.stringify(games));
    closeModal('game-modal');
    renderTab();
    showToast('Game deleted');
    syncToServer({ id }, 'deleteGame');
  }

  // ── Sync to Server ──
function syncToServer(data, action) {

  if (!APPS_SCRIPT_URL) return;

  let payload;

  if (action === "deleteGame") {

    payload = {
      action,
      game_id: data.id
    };

  } else {

    payload = {
      action,
      game_id: data.id,
      original_title: data.originalTitle,
      priority: data.priority,
      convention: data.convention,
      hall: data.hall,
      booth_number: data.booth,
      publisher: data.publisher,
      original_price: data.price,
      original_currency: data.currency,
      convention_url: data.url,
      image_url: data.imageUrl,
      status: data.status,
      notes: data.notes
    };

  }

 fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(payload)
  })
   .then(response => response.text())
  .then(text => {

  console.log("Raw Apps Script Response:", text);

  try {

    const result = JSON.parse(text);

   if (result.success) {

  showToast("Synced to Google Sheets");

  setTimeout(() => {
    loadGames();
  }, 200);

  }else {
      showToast("Sync failed");
    }

  } catch (err) {

    console.error("Invalid JSON:", text);

    showToast("Unexpected server response");
    }
  })
   .catch(error => {
  
    console.error(error);
  
    savePendingSync(
      action,
      payload
    );
  
    showToast(
      "Offline - queued for sync"
    );
  
  });
    }
  function savePendingSync(action, payload) {
  
    pendingSyncQueue.push({
      action,
      payload
    });
  
    localStorage.setItem(
      "pendingSyncQueue",
      JSON.stringify(
        pendingSyncQueue
      )
    );
  
  }

  async function syncPendingQueue() {

    if (
      pendingSyncQueue.length === 0
    ) {
      return;
    }
  
    console.log(
      "Syncing queue:",
      pendingSyncQueue.length
    );
  
    const queueCopy =
      [...pendingSyncQueue];
  
    pendingSyncQueue = [];
  
    localStorage.setItem(
      "pendingSyncQueue",
      JSON.stringify([])
    );
  
    for (const item of queueCopy) {
  
      try {
  
        await fetch(
          APPS_SCRIPT_URL,
          {
            method: "POST",
            headers: {
              "Content-Type":
                "text/plain"
            },
            body: JSON.stringify({
              action:
                item.action,
              ...item.payload
            })
          }
        );
  
      } catch (err) {
  
        pendingSyncQueue.push(item);
  
      }
  
    }
  
    localStorage.setItem(
      "pendingSyncQueue",
      JSON.stringify(
        pendingSyncQueue
      )
    );
  
  }

}

    routeGames.filter(g => g.status === "interested").length;

    routeGames

  html += `

  const byConvention = {};

    game.convention || "Unknown Convention";

  if (!byConvention[convention]) {
    byConvention[convention] = [];

  byConvention[convention].push(game);
  });

  console.log("Route Games", routeGames);
  console.log("By Convention", byConvention);
    
  Object.entries(byConvention).forEach(
    ([convention, list]) => {

      list.sort((a, b) => {

      const statusDiff =
        (statusPriority[a.status] ?? 50)

      if (statusDiff !== 0) {
        return statusDiff;
      }
    
      const priorityDiff =
        (Number(a.priority) || 3)
        -
        (Number(b.priority) || 3);
    
      if (priorityDiff !== 0) {
        return priorityDiff;

            </div>
          </div>

    }
    );

    "main-content"

  }
